<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách thiết bị</title>
</head>
<body>
<h2>Danh sách thiết bị</h2>

<form th:action="@{/gadgets}" method="get">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm...">
    <button type="submit">Search</button>
</form>

<div th:if="${#lists.isEmpty(gadgets)}">
    <p>Kho hàng hiện đang trống</p>
</div>

<table th:if="${!#lists.isEmpty(gadgets)}" border="1">
    <tr>
        <th>ID</th>
        <th>Tên sản phẩm</th>
        <th>Hãng</th>
        <th>Số lượng</th>
        <th>Hành động</th>
    </tr>
    <tr th:each="g : ${gadgets}">
        <td th:text="${g.id}"></td>
        <td th:text="${g.productName}"></td>
        <td th:text="${g.brand}"></td>
        <td th:text="${g.stockQuantity}"></td>
        <td>
            <a th:href="@{/gadgets/edit/{id}(id=${g.id})}">Edit</a> |
            <a th:href="@{/gadgets/delete/{id}(id=${g.id})}"
               onclick="return confirm('Bạn có chắc muốn xóa?')">Delete</a>
        </td>
    </tr>
</table>

<a th:href="@{/gadgets/add}">Thêm mới thiết bị</a>
</body>
</html>
